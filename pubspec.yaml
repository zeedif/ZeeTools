name: zeetools
description: "Toolset for managing, converting, and creating EPUB files."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  window_manager: ^0.5.1

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
